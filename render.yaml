services:
  # 1. La Base de données PostgreSQL
  - type: pserv
    name: acp-db
    databaseName: acp_invest
    user: postgres
    plan: free # Gratuit pendant 90 jours

  # 2. Le Backend FastAPI
  - type: web
    name: acp-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: acp-db
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          type: static
          name: acp-frontend
          property: url

  # 3. Le Frontend React (Vite)
  - type: static
    name: acp-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: acp-backend
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html